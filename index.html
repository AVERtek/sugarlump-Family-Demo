<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>sugarlump sweet neighbor</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

    <style>
        @font-face { font-family: 'Chalet LondonNineteenEighty Regular'; src: url('fonts/Chalet LondonNineteenEighty Regular.otf') format('opentype'); }
        @font-face { font-family: 'DaisyByhapppyal-Regular'; src: url('fonts/DaisyByhapppyal-Regular.otf') format('opentype'); }

        html, body { margin: 0; padding: 0; overflow-x: hidden; font-family: sans-serif; color: #244376; background-color: #ffff99; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; box-sizing: border-box; padding: 0 10px; }
        .card { background-color: #ffff99; padding: 10px; margin-bottom: 1em; display: flex; flex-direction: column; align-items: center; text-align: center; border-radius: 6px; position: relative; }
        
        /* Direct-to-AR: Hidden viewer container */
        .viewer-container { width: 100%; height: 400px; position: relative; background-color: #ffff99; border-radius: 12px; overflow: hidden; }
        #myVideo { width: 100%; height: 100%; position: absolute; top: 0; left: 0; object-fit: cover; z-index: 2; }
        
        /* Hide the 2D model preview but keep the viewer active for AR */
        #myModelViewer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0; pointer-events: none; }
        #myModelViewer button[slot="ar-button"] { display: none; }

        .button-container { margin-top: 20px; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; width: 100%; }
        .action-button { background-color: #ffffff; border-radius: 8px; border: 2px solid #59cbe8; height: 60px; min-width: 250px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.1s; }
        .action-button:active { transform: scale(0.98); }
        .action-button-text { font-size: 26px; color: #000099; font-family: 'Chalet LondonNineteenEighty Regular'; }

        .main-button { background-color: #ffffff; border-radius: 8px; border: 2px solid #59cbe8; height: 42px; width: 300px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-top: 10px; }
        .main-button img { height: 28px; margin-right: 8px; }
        
        a { color: #59cbe8; text-decoration: none; font-weight: bold; }
        h2 { font-family: 'Chalet LondonNineteenEighty Regular'; color: #ff69b4; font-size: 20px; margin: 0.5em 0; }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <img src="images/erin_video_scenes-32.png" style="width: 350px; max-width: 100%;">
        </div>

        <div class="card">
            <div class="viewer-container">
                <video id="myVideo" loop muted playsinline poster="images/Family Demo Poster.png">
                    <source src="Video/sugarlump_family_video.mp4" type="video/mp4">
                </video>
                <model-viewer 
                    id="myModelViewer" 
                    src="Models/entire_family_99cm.glb" 
                    ios-src="Models/GIRL_converted.usdz" 
                    ar 
                    ar-modes="webxr scene-viewer quick-look" 
                    camera-controls 
                    autoplay
                    animation-name="Wave"
                    interaction-prompt="none">
                    <button slot="ar-button"></button>
                </model-viewer>
            </div>

            <p style="font-family: 'Chalet LondonNineteenEighty Regular'; font-weight: bold; color: #000099; margin-top: 15px;">Make Sure Sound is On!</p>

            <div class="button-container">
                <div class="action-button" id="play-pause-button">
                    <img id="play-pause-icon" src="images/play_icon.png" style="height: 2.5em; margin-right: 10px;">
                    <span class="action-button-text"><strong>Play</strong></span>
                </div>
                <div class="action-button" id="ar-launch-button">
                    <img src="images/Heart button.png" style="height: 2.5em; margin-right: 10px;">
                    <span class="action-button-text"><strong>AR Press Here</strong></span>
                </div>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center; width: 100%; margin-bottom: 20px;">
            <button class="main-button" onclick="openRecordingTab()">
                <img src="images/cartoon-phone_t.png" style="filter: hue-rotate(260deg);">
                <span style="font-size: 18px; color: #000099; font-family: 'Chalet LondonNineteenEighty Regular';"><strong>Project Recorder</strong></span>
            </button>
            <button id="viewPrintCertificateButton" class="main-button">
                <img src="images/sl_ribbon2.png" style="opacity: 0.8;">
                <span style="font-size: 18px; color: #000099; font-family: 'Chalet LondonNineteenEighty Regular';"><strong>print certificate</strong></span>
            </button>
        </div>

        <div class="card" style="margin-top: 20px;">
            <a href="https://avertek.net/" target="_blank"><p style="font-family:'Chalet LondonNineteenEighty Regular'; color:#59cbe8; font-size: 14px;">Contact AVERtek to learn more about AR marketing.</p></a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('myVideo');
            const modelViewer = document.getElementById('myModelViewer');
            const playPauseBtn = document.getElementById('play-pause-button');
            const playPauseIcon = document.getElementById('play-pause-icon');
            const arBtn = document.getElementById('ar-launch-button');
            
            // Single Audio Instance
            const arSound = new Audio('Sound/sweet_neighbor_of_mine3.mp3');
            arSound.loop = true;
            let isPlaying = false;

            // Unlock audio for mobile browsers
            function unlockAudio() {
                arSound.play().then(() => {
                    if (!isPlaying) arSound.pause();
                }).catch(e => console.log("Audio unlock required"));
            }

            playPauseBtn.addEventListener('click', () => {
                unlockAudio();
                if (isPlaying) {
                    video.pause();
                    arSound.pause();
                    modelViewer.pause();
                    video.muted = true;
                    playPauseIcon.src = 'images/play_icon.png';
                    playPauseBtn.querySelector('strong').textContent = 'Play';
                } else {
                    video.muted = false;
                    video.play();
                    arSound.play();
                    modelViewer.play();
                    playPauseIcon.src = 'images/pause_icon.png';
                    playPauseBtn.querySelector('strong').textContent = 'Pause';
                }
                isPlaying = !isPlaying;
            });

            arBtn.addEventListener('click', () => {
                // Prime audio immediately on click for Android
                arSound.play().catch(e => console.log("Audio primed"));
                
                video.pause();
                video.muted = true;
                isPlaying = false;
                playPauseIcon.src = 'images/play_icon.png';
                playPauseBtn.querySelector('strong').textContent = 'Play';

                if (modelViewer.canActivateAR) {
                    modelViewer.activateAR();
                } else {
                    alert("AR requires a mobile device.");
                }
            });

            // Monitor AR state to ensure audio persists in WebXR
            modelViewer.addEventListener('ar-status', (event) => {
                if (event.detail.status === 'presenting') {
                    arSound.play(); // Force play when entering AR
                    modelViewer.play();
                } else if (event.detail.status === 'not-presenting') {
                    // Stop audio when user exits AR
                    arSound.pause();
                    arSound.currentTime = 0;
                }
            });

            // Certificate Logic
            document.getElementById('viewPrintCertificateButton').addEventListener('click', async () => {
                const { PDFDocument, rgb, StandardFonts } = PDFLib;
                try {
                    const bytes = await fetch('certificates/sugarlump_app_certificate.pdf').then(res => res.arrayBuffer());
                    const pdfDoc = await PDFDocument.load(bytes);
                    const page = pdfDoc.getPages()[0];
                    const fontB = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
                    page.drawText("Tercek Real Estate Group", { x: 80, y: page.getSize().height - 230, size: 16, font: fontB, color: rgb(8/255, 119/255, 144/255) });
                    const pdfData = await pdfDoc.save();
                    window.open(URL.createObjectURL(new Blob([pdfData], { type: 'application/pdf' })), '_blank');
                } catch (e) { alert("Error generating certificate."); }
            });
        });

        function openRecordingTab() {
            const recWin = window.open("", "_blank");
            recWin.document.write(`
            <html><head><title>Project Recorder</title>
            <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"><\/script>
            <style>
                body { margin: 0; background: #ffff99; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: sans-serif; text-align: center; }
                model-viewer { width: 100%; height: 60vh; background-color: #ffff99; }
                .instr { background: white; padding: 20px; border-radius: 12px; border: 3px solid #59cbe8; width: 85%; }
                .play-btn { background: #59cbe8; color: white; border-radius: 10px; font-size: 22px; font-weight: bold; border: none; cursor: pointer; padding: 15px 40px; margin-top: 15px; }
            </style></head>
            <body>
                <model-viewer id="m" src="Models/entire_family_99cm.glb" autoplay animation-name="Wave" camera-controls></model-viewer>
                <audio id="music" src="Sound/sweet_neighbor_of_mine3.mp3" loop></audio>
                <div class="instr">
                    <p style="color: #ff69b4; font-weight: bold; font-size: 20px;">SCREEN RECORD YOUR MISSION</p>
                    <button id="ctrl" class="play-btn" onclick="const a=document.getElementById('music'); const m=document.getElementById('m'); if(a.paused){a.play(); m.play(); this.innerText='PAUSE';}else{a.pause(); m.pause(); this.innerText='START SHOW';}">START SHOW</button>
                </div>
            </body></html>`);
            recWin.document.close();
        }
    </script>
</body>
</html>
