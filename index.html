<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>sugarlump-Family-Demo</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=0-0000000000"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', '0-0000000000');
    </script>

    <style>
        @font-face {
            font-family: 'Chalet LondonNineteenEighty Regular';
            src: url('fonts/Chalet LondonNineteenEighty Regular.otf') format('opentype');
        }

        html, body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: Google Sans, Noto, Roboto, Helvetica Neue, sans-serif;
            color: #244376;
            background-color: #ffff99;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
            padding: 0 15px;
        }

        .card {
            background-color: #ffff99;
            padding: 10px;
            margin-bottom: 1em;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
        }

        .logo {
            width: 350px;
            max-width: 90%;
            height: auto;
            display: block;
            margin: auto;
        }

        .viewer-container {
            width: 100%;
            height: 400px;
            position: relative;
            background: #000;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
        }

        .video-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .video-overlay img {
            width: 80px;
            height: 80px;
            opacity: 0.8;
        }

        #myVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 2;
        }

        #myModelViewer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #myModelViewer button[slot="ar-button"] {
            display: none;
        }

        .link-list h2 {
            font-family: 'Chalet LondonNineteenEighty Regular', sans-serif;
            color: #ff69b4;
            font-size: 20px;
            margin: 10px 0;
        }

        .link-list a {
            color: #59cbe8;
            text-decoration: underline !important;
            text-decoration-color: currentColor !important;
            font-weight: bold;
        }

        h2 a {
            text-decoration: underline !important;
            text-decoration-color: currentColor !important;
            color: inherit;
        }

        .footer-link {
            font-family: 'Chalet LondonNineteenEighty Regular';
            color: #59cbe8;
            font-size: 14px;
            margin-top: 20px;
        }

        /* Banner Styles */
        .banner-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none; /* Hidden by default */
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .banner-content {
            position: relative;
            width: 90%;
            max-width: 500px;
        }

        .banner-bg {
            width: 100%;
            height: auto;
            border-radius: 12px;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: rgba(0,0,0,0.5);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 20px;
        }

        .launch-text {
            text-decoration: underline;
            text-decoration-color: currentColor;
            font-weight: bold;
            cursor: pointer;
            color: #007bff;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <img src="images/sugarlump_experience_AR_assets-01.png" alt="Sugarlump Logo" class="logo">
        </div>

        <div class="card">
            <div class="viewer-container" id="video-wrapper">
                <div class="video-overlay" id="overlay-icon">
                    <img src="images/play_icon.png" alt="Play/Pause">
                </div>

                <video id="myVideo" loop muted playsinline poster="images/Family Demo Poster.png">
                    <source src="Video/sugarlump_family_video.mp4" type="video/mp4">
                </video>
                
                <model-viewer 
                    id="myModelViewer" 
                    src="Models/entire_family_99cm.glb" 
                    ios-src="Models/GIRL_converted.usdz" 
                    ar ar-modes="quick-look webxr scene-viewer" 
                    style="display: none;">
                </model-viewer>
            </div>

            <p style="font-family: 'Chalet LondonNineteenEighty Regular'; font-weight: bold; color: #000099; margin-top: 15px;">
                Make Sure Sound is On!
            </p>

            <div class="link-list">
                <img src="images/erin_video_scenes-34.png" style="width: 300px; max-width: 90%; margin-bottom: 10px;">
                <h2>why: <a href="https://sugarlump.love/" target="_blank">the kindness project</a></h2>
                <h2>rewards: <a href="https://sugarlump.love/join-the-fun" target="_blank">local elementary schools</a></h2>
                <h2>FAQ: <a href="https://sugarlump.love/faq" target="_blank">about sugarlump</a></h2>
                <h2>no cost: <a href="https://sugarlump.love/contact" target="_blank">join sugarlump kindness club</a></h2>
            </div>

            <p style="font-family: 'Chalet LondonNineteenEighty Regular';">So Easy to Get Started! <span class="launch-text" onclick="showBanner()">It's easy to get started...</span></p>
            
            <div class="footer-link">
                <a href="https://avertek.net/" target="_blank">Contact AVERtek to learn more about XR marketing.</a>
            </div>
        </div>
    </div>

    <div id="popup-banner" class="banner-container">
        <div class="banner-content">
            <img src="images/Pop-Up Banner1.png" alt="Banner" class="banner-bg">
            <button class="close-btn" onclick="hideBanner()">×</button>
        </div>
    </div>

    <script>
        // Banner Functions
        function showBanner() {
            document.getElementById('popup-banner').style.display = 'flex';
        }
        function hideBanner() {
            document.getElementById('popup-banner').style.display = 'none';
        }

        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('myVideo');
            const wrapper = document.getElementById('video-wrapper');
            const overlay = document.getElementById('overlay-icon');
            const overlayImg = overlay.querySelector('img');
            const modelViewer = document.getElementById('myModelViewer');

            const arSound = new Audio('Sound/sweet_neighbor_of_mine3.mp3');
            arSound.loop = true;
            let isPlaying = false;

            const initAudio = () => {
                arSound.play().then(() => {
                    arSound.pause();
                    arSound.currentTime = 0;
                }).catch(e => console.log("Interaction needed"));
                window.removeEventListener('touchstart', initAudio);
                window.removeEventListener('click', initAudio);
            };
            window.addEventListener('touchstart', initAudio);
            window.addEventListener('click', initAudio);

            async function togglePlayPause() {
                if (isPlaying) {
                    video.pause();
                    arSound.pause();
                    video.muted = true;
                    overlayImg.src = 'images/play_icon.png';
                    overlay.style.opacity = '1';
                } else {
                    try {
                        if (wrapper.requestFullscreen) {
                            await wrapper.requestFullscreen();
                        } else if (wrapper.webkitRequestFullscreen) {
                            await wrapper.webkitRequestFullscreen();
                        }
                    } catch (err) {
                        console.log("Fullscreen request rejected.");
                    }

                    video.muted = false;
                    video.play();
                    arSound.play();
                    overlayImg.src = 'images/pause_icon.png';
                    setTimeout(() => { if(isPlaying) overlay.style.opacity = '0'; }, 800);
                }
                isPlaying = !isPlaying;
            }

            wrapper.addEventListener('click', togglePlayPause);

            if (modelViewer) {
                modelViewer.addEventListener('ar-status', (event) => {
                    if (event.detail.status === 'presenting') {
                        arSound.play();
                    } else {
                        arSound.pause();
                    }
                });
            }
        });
    </script>
</body>
</html>
