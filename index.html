<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>sugarlump-Amazon-Template</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=0-0000000000"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', '0-0000000000');
    </script>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: Google Sans, Noto, Roboto, Helvetica Neue, sans-serif;
            color: #244376;
            background-color: #ffff99;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
            padding: 0 10px;
        }

        .card {
            background-color: #ffff99;
            border: 2px solid #ffff99;
            padding: 10px;
            margin: 0 0 1em 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            border-radius: 6px;
            position: relative;
        }

        .viewer-container {
            width: 100%;
            height: 400px;
            position: relative;
        }

        #myVideo {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            object-fit: cover;
            z-index: 2;
        }

        #myModelViewer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #myModelViewer button[slot="ar-button"] {
            display: none; /* Keep the default button hidden */
        }

        .button-container {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .action-button {
            background-color: #ffffff;
            border-radius: 8px;
            border: 2px solid #59cbe8;
            height: 60px;
            min-width: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            cursor: pointer;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .action-button:hover {
            background-color: #f0f8ff;
            border-color: #48b0cc;
        }

        .action-button-text {
            font-size: 32px;
            color: #000099;
            font-family: 'Chalet LondonNineteenEighty Regular', sans-serif;
            white-space: nowrap;
        }

        @font-face {
            font-family: 'Chalet LondonNineteenEighty Regular';
            src: url('fonts/Chalet LondonNineteenEighty Regular.otf') format('opentype');
        }

        a { color: #59cbe8; text-decoration: none; font-weight: bold; }
        .card h2 { margin: 0.5em 0; padding: 0; line-height: 1.2; }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <img src="images/erin_video_scenes-32.png" alt="Logo" style="width: 350px; height: auto; display: block; margin: auto;">
        </div>

        <div class="card">
            <div class="viewer-container">
                <video id="myVideo" loop muted playsinline poster="images/Family Demo Poster.png">
                    <source src="Video/sugarlump_family_video.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <model-viewer
                    id="myModelViewer"
                    src="Models/entire_family_99cm.glb"
                    ios-src="Models/GIRL_converted.usdz"
                    alt="A 3D model"
                    ar
                    ar-modes="scene-viewer quick-look"
                    camera-controls
                    poster="images/Poster_SN_Scene.png"
                    shadow-intensity="1"
                    ar-scale="auto"
                    ar-placement="floor"
                    interaction-prompt="none"
                    autoplay
                    animation-name="Wave">
                    <button slot="ar-button" id="real-ar-button"></button>
                </model-viewer>
            </div>

            <div style="text-align: center; margin-top: 10px;">
                <p style="font-family: Chalet LondonNineteenEighty Regular; font-weight: bold; color: #000099;"> Make Sure Sound is On!</p>
            </div>
            
            <div class="button-container">
                <div class="action-button" id="play-pause-button">
                    <img id="play-pause-icon" src="images/play_icon.png" style="height: 4em; width: auto; margin-right: 5px;" alt="Play/Pause Icon">
                    <span class="action-button-text">
                        <strong>Play</strong>
                    </span>
                </div>

                <div class="action-button" id="custom-ar-trigger">
                    <img src="images/Heart button.png" style="height: 4em; width: auto; margin-right: 5px;" alt="Custom AR Icon">
                    <span class="action-button-text">
                        <strong>AR Press Here</strong>
                    </span>
                </div>
            </div>

            <div class="card" style="margin-top: 20px;">
                <img src="images/erin_video_scenes-34.png" style="width: 300px; max-width: 90%; margin-bottom: 10px;">
                <h2><p style="font-family:'Chalet LondonNineteenEighty Regular'; color: #ff69b4; font-size: 20px;"><b>about:</b><a href="https://sugarlump.love/about" target="_blank"> creativity + kindness</a></p></h2>
                <h2><p style="font-family:'Chalet LondonNineteenEighty Regular'; color: #ff69b4; font-size: 20px;"><b>rewards:</b><a href="https://sugarlump.love/" target="_blank"> the kindness project</a></p></h2>
                <h2><p style="font-family:'Chalet LondonNineteenEighty Regular'; color: #ff69b4; font-size: 20px;"><b>join:</b><a href="https://sugarlump.love/contact" target="_blank"> sugarlump kindness club</a></p></h2>
                <h2><p style="font-family:'Chalet LondonNineteenEighty Regular'; color: #ff69b4; font-size: 20px;"><b>shop:</b><a href="https://sugarlump.love/shop" target="_blank"> creative kindness kits</a></p></h2>
                <h2><p style="font-family:'Chalet LondonNineteenEighty Regular'; color: #ff69b4; font-size: 20px;"><b>brag tags:</b><a href="https://www.schoollife.com/bragtags-intro" target="_blank"> accomplishment, recognition, confidence</a></p></h2>
                <h2><p style="font-family:'Chalet LondonNineteenEighty Regular'; color: #ff69b4; font-size: 20px;"><b>sponsors:</b><a href="https://sugarlump.love/be-a-sponsor" target="_blank"> get involved</a></p></h2>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('myVideo');
            const modelViewer = document.getElementById('myModelViewer');
            const playPauseButton = document.getElementById('play-pause-button');
            const playPauseIcon = document.getElementById('play-pause-icon');
            const customArTrigger = document.getElementById('custom-ar-trigger');
            
            // Initialize the separate audio object
            const arSound = new Audio('Sound/sweet_neighbor_of_mine3.mp3');
            arSound.loop = true; 

            let isPlaying = false;

            // Handle Video + Audio Playback
            function togglePlayPause() {
                if (isPlaying) {
                    video.pause();
                    arSound.pause(); 
                    video.muted = true;
                    playPauseIcon.src = 'images/play_icon.png';
                    playPauseButton.querySelector('strong').textContent = 'Play';
                } else {
                    video.play().catch(err => console.log("Video wait", err));
                    arSound.play().catch(err => console.log("Audio wait", err));
                    video.muted = false;
                    playPauseIcon.src = 'images/pause_icon.png';
                    playPauseButton.querySelector('strong').textContent = 'Pause';
                }
                isPlaying = !isPlaying;
            }

            if (playPauseButton) {
                playPauseButton.addEventListener('click', togglePlayPause);
            }

            // Launch AR and trigger sound
            if (customArTrigger) {
                customArTrigger.addEventListener('click', () => {
                    // Reset UI
                    video.pause();
                    video.muted = true;
                    isPlaying = false;
                    playPauseIcon.src = 'images/play_icon.png';
                    if(playPauseButton) playPauseButton.querySelector('strong').textContent = 'Play';

                    // Play sound (Interaction ensures this is allowed)
                    arSound.play().catch(err => console.log("Interaction required for audio", err));

                    if (modelViewer.canActivateAR) {
                        modelViewer.activateAR();
                    } else {
                        alert("AR is not supported on this device/browser.");
                    }
                });
            }

            // stop sound if they leave AR mode back to the browser
            modelViewer.addEventListener('ar-status', (event) => {
                if (event.detail.status === 'not-presenting') {
                    arSound.pause();
                }
            });
        });
    </script>
</body>
</html>
