<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>sugarlump sweet neighbor</title>
    
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

    <style>
        html, body { margin: 0; padding: 0; overflow-x: hidden; font-family: 'Google Sans', sans-serif; color: #244376; background-color: #ffff99; }
        .container { max-width: 600px; width: 100%; box-sizing: border-box; padding: 0 10px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        .card { background-color: #ffff99; padding: 10px; margin-bottom: 1em; display: flex; flex-direction: column; align-items: center; text-align: center; border-radius: 6px; width: 100%; box-sizing: border-box; }

        /* AR Viewer: Invisible but active to ensure model/audio download */
        #reveal { 
            position: absolute; 
            width: 1px; 
            height: 1px; 
            opacity: 0.01; 
            pointer-events: none; 
        }

        .main-button { 
            background-color: #ffffff; border-radius: 8px; border: 2px solid #59cbe8; 
            height: 42px; width: 300px; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; margin-top: 10px; 
        }
        .main-button img { height: 28px; margin-right: 8px; }

        .hunt-header { font-family: 'Chalet LondonNineteenEighty Regular', sans-serif; color: #ff69b4; text-align: center; margin: 20px 0; text-transform: lowercase; }
        
        #video-container { position: relative; width: 100%; margin-bottom: 15px; }
        #video-overlay { width: 100%; border-radius: 12px; display: block; }
        #play-pause-video { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            border-radius: 50%; padding: 10px 15px; background: rgba(255,255,255,0.8); 
            border:none; font-size: 30px; cursor:pointer; 
        }

        a { color: #59cbe8; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <img src="images/erin_video_scenes-32.png" style="width: 350px; max-width: 100%;">
    </div>

    <h1 class="hunt-header">join the hunt; tell your friends</h1>
    <div id="video-container">
        <video id="video-overlay" poster="images/Video Poster_2.png" playsinline muted>
            <source src="Video/sugarlump_intro_erin_2.mp4" type="video/mp4">
        </video>
        <button id="play-pause-video">▶</button>
    </div>

    <model-viewer 
        id="reveal" 
        src="Models/entire_family_99cm.glb?sound=https://avertek.net/sugarlump/Sound/sweet_neighbor_of_mine3.mp3" 
        ios-src="Models/GIRL_converted.usdz"
        ar 
        ar-modes="scene-viewer webxr quick-look" 
        autoplay
        animation-name="Wave"
        loading="eager">
    </model-viewer>

    <p style="text-align:center; font-weight: bold; color: #000099; font-size: 14px;">Make Sure Wi-Fi and Sound is On!</p>

    <div style="display: flex; flex-direction: column; align-items: center; width: 100%;">
        <button id="ar-launch-btn" class="main-button">
            <img src="images/Heart button.png">
            <span style="font-size: 18px; color: #000099;"><strong>1. push here</strong></span>
        </button>

        <button class="main-button" onclick="openRecordingTab()">
            <img src="images/cartoon-phone_t.png" style="filter: hue-rotate(260deg);">
            <span style="font-size: 18px; color: #000099;"><strong>2. record project</strong></span>
        </button>
        
        <button id="viewPrintCertificateButton" class="main-button">
            <img src="images/sl_ribbon2.png" style="opacity: 0.8;">
            <span style="font-size: 18px; color: #000099;"><strong>3. print certificate</strong></span>
        </button>
    </div>

    <p style="text-align:center; color: #ff69b4; font-size: 14px; margin-top: 20px;">Have An Adult Always Supervise Your "Kindness Projects".</p>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const video = document.getElementById('video-overlay');
        const playBtn = document.getElementById('play-pause-video');
        const arBtn = document.getElementById('ar-launch-btn');
        const mv = document.getElementById('reveal');

        // Video control logic
        function toggleVideo() {
            if (video.paused) { 
                video.play(); 
                video.muted = false; 
                playBtn.style.display = "none"; 
            } else { 
                video.pause(); 
                playBtn.style.display = "block"; 
            }
        }
        playBtn.addEventListener('click', toggleVideo);
        video.addEventListener('click', toggleVideo);

        // AR Launch logic
        arBtn.addEventListener('click', async () => {
            // Pause site video so it doesn't clash with AR audio
            video.pause();
            playBtn.style.display = "block";

            // Wait for model-viewer to be ready
            await mv.updateComplete;

            if (mv.canActivateAR) {
                mv.activateAR();
            } else {
                alert("AR features require a mobile device (iOS Safari or Android Chrome).");
            }
        });
        
        // Certificate Logic (Simplified for brevity)
        document.getElementById('viewPrintCertificateButton').addEventListener('click', async () => {
             alert("Generating Certificate...");
             // Insert your existing pdf-lib logic here
        });
    });

    function openRecordingTab() {
        // Your existing Project Recorder window.open logic goes here
        alert("Opening Recorder...");
    }
</script>

</body>
</html>
