<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>sugarlump sweet neighbor</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    
    <style>
        @font-face { font-family: 'Chalet LondonNineteenEighty Regular'; src: url('fonts/Chalet LondonNineteenEighty Regular.otf') format('opentype'); }
        @font-face { font-family: 'DaisyByhapppyal-Regular'; src: url('fonts/DaisyByhapppyal-Regular.otf') format('opentype'); }

        html, body { margin: 0; padding: 0; overflow-x: hidden; font-family: sans-serif; color: #244376; background-color: #ffff99; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; box-sizing: border-box; padding: 0 10px; }
        .card { background-color: #ffff99; padding: 10px; margin-bottom: 1em; display: flex; flex-direction: column; align-items: center; text-align: center; border-radius: 6px; position: relative; }
        
        .viewer-container { width: 100%; height: 400px; position: relative; background-color: #ffff99; border-radius: 12px; overflow: hidden; }
        #myVideo { width: 100%; height: 100%; position: absolute; top: 0; left: 0; object-fit: cover; z-index: 2; }
        #myModelViewer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #myModelViewer button[slot="ar-button"] { display: none; }

        .button-container { margin-top: 20px; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; width: 100%; }
        .action-button { background-color: #ffffff; border-radius: 8px; border: 2px solid #59cbe8; height: 60px; min-width: 250px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .action-button-text { font-size: 26px; color: #000099; font-family: 'Chalet LondonNineteenEighty Regular'; }

        .main-button { background-color: #ffffff; border-radius: 8px; border: 2px solid #59cbe8; height: 42px; width: 300px; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-top: 10px; }
        .main-button img { height: 28px; margin-right: 8px; }
        
        a { color: #59cbe8; text-decoration: none; font-weight: bold; }
        h2 { font-family: 'Chalet LondonNineteenEighty Regular'; color: #ff69b4; font-size: 20px; margin: 0.5em 0; }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <img src="images/erin_video_scenes-32.png" style="width: 350px; max-width: 100%; height: auto;">
        </div>

        <div class="card">
            <div class="viewer-container">
                <video id="myVideo" loop muted playsinline poster="images/Family Demo Poster.png">
                    <source src="Video/sugarlump_family_video.mp4" type="video/mp4">
                </video>
                <model-viewer 
                    id="myModelViewer" 
                    src="Models/entire_family_99cm.glb" 
                    ios-src="Models/GIRL_converted.usdz" 
                    ar ar-modes="webxr scene-viewer quick-look" 
                    camera-controls 
                    autoplay
                    animation-name="Wave"
                    interaction-prompt="none">
                    <button slot="ar-button"></button>
                </model-viewer>
            </div>

            <p style="font-family: 'Chalet LondonNineteenEighty Regular'; font-weight: bold; color: #000099; margin-top: 15px;">Make Sure Sound is On!</p>

            <div class="button-container">
                <div class="action-button" id="play-pause-button">
                    <img id="play-pause-icon" src="images/play_icon.png" style="height: 2.5em; margin-right: 10px;">
                    <span class="action-button-text"><strong>Play</strong></span>
                </div>
                <div class="action-button" id="ar-launch-button">
                    <img src="images/Heart button.png" style="height: 2.5em; margin-right: 10px;">
                    <span class="action-button-text"><strong>AR Press Here</strong></span>
                </div>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; align-items: center; width: 100%; margin-bottom: 20px;">
            <button class="main-button" onclick="openRecordingTab()">
                <img src="images/cartoon-phone_t.png" style="filter: hue-rotate(260deg);">
                <span style="font-size: 18px; color: #000099; font-family: 'Chalet LondonNineteenEighty Regular';"><strong>record project</strong></span>
            </button>
            <button id="viewPrintCertificateButton" class="main-button">
                <img src="images/sl_ribbon2.png" style="opacity: 0.8;">
                <span style="font-size: 18px; color: #000099; font-family: 'Chalet LondonNineteenEighty Regular';"><strong>print certificate</strong></span>
            </button>
        </div>

        <div class="card">
            <img src="images/erin_video_scenes-34.png" style="width: 300px; max-width: 90%;">
            <h2><b>about:</b> <a href="https://sugarlump.love/about" target="_blank">creativity + kindness</a></h2>
            <h2><b>rewards:</b> <a href="https://sugarlump.love/" target="_blank">the kindness project</a></h2>
            <h2><b>join:</b> <a href="https://sugarlump.love/contact" target="_blank">sugarlump kindness club</a></h2>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('myVideo');
            const modelViewer = document.getElementById('myModelViewer');
            const playPauseBtn = document.getElementById('play-pause-button');
            const playPauseIcon = document.getElementById('play-pause-icon');
            const arBtn = document.getElementById('ar-launch-button');
            
            // Create audio object
            const arSound = new Audio('Sound/sweet_neighbor_of_mine3.mp3');
            arSound.loop = true;
            let isPlaying = false;

            // FUNCTION TO UNLOCK AUDIO (Crucial for Mobile)
            function unlockAudio() {
                arSound.play().then(() => {
                    if (!isPlaying) {
                        arSound.pause(); // Just "warm it up" if we aren't supposed to play yet
                    }
                }).catch(e => console.log("Audio unlock failed:", e));
            }

            function togglePlayPause() {
                unlockAudio();
                if (isPlaying) {
                    video.pause();
                    arSound.pause();
                    modelViewer.pause();
                    video.muted = true;
                    playPauseIcon.src = 'images/play_icon.png';
                    playPauseBtn.querySelector('strong').textContent = 'Play';
                } else {
                    video.muted = false;
                    video.play();
                    arSound.play();
                    modelViewer.play();
                    playPauseIcon.src = 'images/pause_icon.png';
                    playPauseBtn.querySelector('strong').textContent = 'Pause';
                }
                isPlaying = !isPlaying;
            }

            playPauseBtn.addEventListener('click', togglePlayPause);

            arBtn.addEventListener('click', () => {
                // Ensure audio is active immediately on click
                arSound.play();
                video.pause();
                video.muted = true;
                isPlaying = false;
                playPauseIcon.src = 'images/play_icon.png';
                playPauseBtn.querySelector('strong').textContent = 'Play';

                if (modelViewer.canActivateAR) {
                    modelViewer.activateAR();
                } else {
                    alert("AR requires a mobile device.");
                }
            });

            // Listen for AR session status to keep audio in sync
            modelViewer.addEventListener('ar-status', (event) => {
                if (event.detail.status === 'presenting') {
                    arSound.play();
                } else if (event.detail.status === 'not-presenting') {
                    // Audio continues or pauses based on your preference
                    // arSound.pause(); 
                }
            });
        });

        // Placeholder for the PDF and Recording logic (Same as working code)
        async function openRecordingTab() { /* ... see previous code ... */ }
    </script>
</body>
</html>
