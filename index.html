<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>sugarlump-Amazon-Template</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=0-0000000000"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', '0-0000000000');
    </script>

    <style>
        html, body {
            margin: 0; padding: 0; overflow-x: hidden;
            font-family: Google Sans, Noto, Roboto, Helvetica Neue, sans-serif;
            color: #244376; background-color: #ffff99;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { max-width: 600px; width: 100%; box-sizing: border-box; padding: 0 10px; }

        .card {
            background-color: #ffff99; border: 2px solid #ffff99; padding: 10px;
            margin: 0 0 1em 0; display: flex; flex-direction: column;
            align-items: center; text-align: center; border-radius: 6px; position: relative;
        }

        .viewer-container { width: 100%; height: 400px; position: relative; }

        #myVideo {
            width: 100%; height: 100%; position: absolute;
            top: 0; left: 0; object-fit: cover; z-index: 2;
        }

        #myModelViewer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }

        /* Hiding the default AR button to use your custom Heart button */
        #myModelViewer button[slot="ar-button"] { display: none; }

        .button-container {
            margin-top: 30px; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px;
        }

        .action-button {
            background-color: #ffffff; border-radius: 8px; border: 2px solid #59cbe8;
            height: 60px; min-width: 250px; display: flex; align-items: center;
            justify-content: center; padding: 10px; cursor: pointer;
        }

        .action-button-text {
            font-size: 32px; color: #000099;
            font-family: 'Chalet LondonNineteenEighty Regular', sans-serif;
        }

        @font-face {
            font-family: 'Chalet LondonNineteenEighty Regular';
            src: url('fonts/Chalet LondonNineteenEighty Regular.otf') format('opentype');
        }

        a { color: #59cbe8; text-decoration: none; font-weight: bold; }
        .card h2 { margin: 0.5em 0; padding: 0; line-height: 1.2; }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <img src="images/erin_video_scenes-32.png" alt="Logo" style="width: 350px; height: auto;">
        </div>

        <div class="card">
            <div class="viewer-container">
                <video id="myVideo" loop muted playsinline poster="images/Family Demo Poster.png">
                    <source src="Video/sugarlump_family_video.mp4" type="video/mp4">
                </video>
                
                <model-viewer
                    id="myModelViewer"
                    src="Models/entire_family_99cm.glb?sound=Sound/sweet_neighbor_of_mine3.mp3"
                    ios-src="Models/GIRL_converted.usdz"
                    ar
                    ar-modes="scene-viewer webxr quick-look"
                    camera-controls
                    poster="images/Poster_SN_Scene.png"
                    autoplay
                    animation-name="Wave">
                    <button slot="ar-button"></button>
                </model-viewer>
            </div>

            <p style="font-family: Chalet LondonNineteenEighty Regular; font-weight: bold; color: #000099; margin-top: 10px;">Make Sure Sound is On!</p>
            
            <div class="button-container">
                <div class="action-button" id="play-pause-button">
                    <img id="play-pause-icon" src="images/play_icon.png" style="height: 4em; width: auto; margin-right: 5px;">
                    <span class="action-button-text"><strong>Play</strong></span>
                </div>
                <div class="action-button" id="ar-trigger">
                    <img src="images/Heart button.png" style="height: 4em; width: auto; margin-right: 5px;">
                    <span class="action-button-text"><strong>AR Press Here</strong></span>
                </div>
            </div>

            <div class="card" style="margin-top: 20px;">
                <img src="images/erin_video_scenes-34.png" style="width: 300px; max-width: 90%;">
                <h2><p style="font-family:'Chalet LondonNineteenEighty Regular'; color: #ff69b4; font-size: 20px;"><b>about:</b><a href="https://sugarlump.love/about" target="_blank"> creativity + kindness</a></p></h2>
                <h2><p style="font-family:'Chalet LondonNineteenEighty Regular'; color: #ff69b4; font-size: 20px;"><b>rewards:</b><a href="https://sugarlump.love/" target="_blank"> the kindness project</a></p></h2>
                <h2><p style="font-family:'Chalet LondonNineteenEighty Regular'; color: #ff69b4; font-size: 20px;"><b>join:</b><a href="https://sugarlump.love/contact" target="_blank"> sugarlump kindness club</a></p></h2>
                <h2><p style="font-family:'Chalet LondonNineteenEighty Regular'; color: #ff69b4; font-size: 20px;"><b>shop:</b><a href="https://sugarlump.love/shop" target="_blank"> creative kindness kits</a></p></h2>
                <h2><p style="font-family:'Chalet LondonNineteenEighty Regular'; color: #ff69b4; font-size: 20px;"><b>brag tags:</b><a href="https://www.schoollife.com/bragtags-intro" target="_blank"> accomplishment, recognition, confidence</a></p></h2>
                <h2><p style="font-family:'Chalet LondonNineteenEighty Regular'; color: #ff69b4; font-size: 20px;"><b>sponsors:</b><a href="https://sugarlump.love/be-a-sponsor" target="_blank"> get involved</a></p></h2>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const video = document.getElementById('myVideo');
            const modelViewer = document.getElementById('myModelViewer');
            const playPauseButton = document.getElementById('play-pause-button');
            const playPauseIcon = document.getElementById('play-pause-icon');
            const arTrigger = document.getElementById('ar-trigger');
            
            // Dedicated audio object for browser playback
            const arSound = new Audio('Sound/sweet_neighbor_of_mine3.mp3');
            arSound.loop = true;

            let isPlaying = false;

            // Handle the 2D Play/Pause Button
            playPauseButton.addEventListener('click', () => {
                if (isPlaying) {
                    video.pause();
                    arSound.pause();
                    video.muted = true;
                    playPauseIcon.src = 'images/play_icon.png';
                    playPauseButton.querySelector('strong').textContent = 'Play';
                } else {
                    video.muted = false;
                    video.play();
                    arSound.play();
                    playPauseIcon.src = 'images/pause_icon.png';
                    playPauseButton.querySelector('strong').textContent = 'Pause';
                }
                isPlaying = !isPlaying;
            });

            // Handle the AR Launch
            arTrigger.addEventListener('click', () => {
                // Stop the 2D video stuff
                video.pause();
                video.muted = true;
                isPlaying = false;
                playPauseIcon.src = 'images/play_icon.png';
                playPauseButton.querySelector('strong').textContent = 'Play';

                // Activate AR - The ?sound query in the src handles the Scene Viewer audio
                if (modelViewer.canActivateAR) {
                    modelViewer.activateAR();
                } else {
                    alert("AR is supported only on mobile devices.");
                }
            });
        });
    </script>
</body>
</html>
