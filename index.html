<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>sugarlump-Amazon-Template</title>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    html, body {
      margin: 0; padding: 0; overflow-x: hidden;
      font-family: Google Sans, Noto, Roboto, Helvetica Neue, sans-serif;
      color: #244376; background-color: #ffff99;
      display: flex; flex-direction: column; align-items: center;
    }
    .container { max-width: 600px; width: 100%; box-sizing: border-box; padding: 0 10px; }
    .card {
      background-color: #ffff99; border: 2px solid #ffff99; padding: 10px;
      margin: 0 0 1em 0; display: flex; flex-direction: column; align-items: center;
      text-align: center; border-radius: 6px; position: relative;
    }
    .viewer-container { width: 100%; height: 400px; position: relative; }
    #myVideo { width: 100%; height: 100%; position: absolute; top: 0; left: 0; object-fit: cover; z-index: 2; }
    #myModelViewer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    #myModelViewer button[slot="ar-button"] { opacity: 0; pointer-events: none; }
    .button-container { margin-top: 30px; display: flex; justify-content: center; flex-wrap: wrap; gap: 10px; }
    .action-button {
      background-color: #ffffff; border-radius: 8px; border: 2px solid #59cbe8;
      height: 60px; min-width: 250px; display: flex; align-items: center;
      justify-content: center; padding: 10px; cursor: pointer;
      transition: background-color .3s, border-color .3s;
    }
    .action-button:hover { background-color: #f0f8ff; border-color: #48b0cc; }
    .action-button-text {
      font-size: 32px; color: #000099; white-space: nowrap;
      font-family: 'Chalet LondonNineteenEighty Regular', sans-serif;
    }
    @font-face {
      font-family: 'Chalet LondonNineteenEighty Regular';
      src: url('fonts/Chalet LondonNineteenEighty Regular.otf') format('opentype');
    }
    a { color: #59cbe8; text-decoration: none; font-weight: bold; }
    .card h2 { margin: .5em 0; line-height: 1.2; }
    .card h2 p { margin: 0; }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <img src="images/erin_video_scenes-32.png" alt="Logo" style="width:350px;height:auto;display:block;margin:auto;">
    </div>

    <div class="card">
      <div class="viewer-container">
        <video id="myVideo" loop muted playsinline poster="images/Family Demo Poster.png">
          <source src="Video/sugarlump_family_video.mp4" type="video/mp4">
        </video>

        <model-viewer
          id="myModelViewer"
          src="Models/entire_family_99cm.glb?sound=Sound/sweet_neighbor_of_mine3.mp3"
          ios-src="Models/GIRL_converted.usdz"
          alt="A 3D model"
          ar
          ar-modes="scene-viewer webxr quick-look"
          camera-controls
          poster="images/Poster_SN_Scene.png"
          shadow-intensity="1"
          ar-scale="auto"
          ar-placement="floor"
          interaction-prompt="none"
          autoplay
          animation-name="Wave">
          <button slot="ar-button"></button>
        </model-viewer>
      </div>

      <div style="text-align:center;">
        <p style="font-family:Chalet LondonNineteenEighty Regular;font-weight:bold;color:#000099;">Make Sure Sound is On!</p>
      </div>

      <div class="button-container">
        <div class="action-button" id="play-pause-button">
          <img id="play-pause-icon" src="images/play_icon.png" style="height:4em;width:auto;margin-right:5px;" alt="Play/Pause Icon">
          <span class="action-button-text"><strong>Play</strong></span>
        </div>
        <div class="action-button" id="ar-button">
          <img src="images/Heart button.png" style="height:4em;width:auto;margin-right:5px;" alt="Custom AR Icon">
          <span class="action-button-text"><strong>AR Press Here</strong></span>
        </div>
      </div>

      <div class="card" style="margin-top:20px;">
        <img src="images/erin_video_scenes-34.png" style="width:300px;max-width:90%;margin-bottom:10px;">
        <h2><p style="font-family:'Chalet LondonNineteenEighty Regular';color:#ff69b4;font-size:20px;">
          <b>about:</b> <a href="https://sugarlump.love/about" target="_blank">creativity + kindness</a></p></h2>
        <h2><p style="font-family:'Chalet LondonNineteenEighty Regular';color:#ff69b4;font-size:20px;">
          <b>rewards:</b> <a href="https://sugarlump.love/" target="_blank">the kindness project</a></p></h2>
        <h2><p style="font-family:'Chalet LondonNineteenEighty Regular';color:#ff69b4;font-size:20px;">
          <b>join:</b> <a href="https://sugarlump.love/contact" target="_blank">sugarlump kindness club</a></p></h2>
        <h2><p style="font-family:'Chalet LondonNineteenEighty Regular';color:#ff69b4;font-size:20px;">
          <b>shop:</b> <a href="https://sugarlump.love/shop" target="_blank">creative kindness kits</a></p></h2>
        <h2><p style="font-family:'Chalet LondonNineteenEighty Regular';color:#ff69b4;font-size:20px;">
          <b>brag tags:</b> <a href="https://www.schoollife.com/bragtags-intro" target="_blank">accomplishment, recognition, confidence</a></p></h2>
        <h2><p style="font-family:'Chalet LondonNineteenEighty Regular';color:#ff69b4;font-size:20px;">
          <b>sponsors:</b> <a href="https://sugarlump.love/be-a-sponsor" target="_blank">get involved</a></p></h2>
      </div>
    </div>
  </div>

  <script>
  document.addEventListener('DOMContentLoaded', () => {
    const video = document.getElementById('myVideo');
    const modelViewer = document.getElementById('myModelViewer');
    const playPauseButton = document.getElementById('play-pause-button');
    const playPauseIcon = document.getElementById('play-pause-icon');
    const arButton = document.getElementById('ar-button');

    const arSound = new Audio('Sound/sweet_neighbor_of_mine3.mp3');
    arSound.loop = true;
    let isPlaying = false;

    const initAudio = () => {
      arSound.play().then(() => {
        arSound.pause(); arSound.currentTime = 0;
      }).catch(()=>{});
      window.removeEventListener('touchstart', initAudio);
      window.removeEventListener('click', initAudio);
    };
    window.addEventListener('touchstart', initAudio);
    window.addEventListener('click', initAudio);

    function togglePlayPause() {
      if (isPlaying) {
        video.pause(); arSound.pause(); video.muted = true;
        playPauseIcon.src = 'images/play_icon.png';
        playPauseButton.querySelector('strong').textContent = 'Play';
      } else {
        video.muted = false; video.play(); arSound.play();
        playPauseIcon.src = 'images/pause_icon.png';
        playPauseButton.querySelector('strong').textContent = 'Pause';
      }
      isPlaying = !isPlaying;
    }
    playPauseButton.addEventListener('click', togglePlayPause);

    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

    arButton.addEventListener('click', async () => {
      video.pause(); video.muted = true; arSound.pause();
      isPlaying = false;
      playPauseIcon.src = 'images/play_icon.png';
      playPauseButton.querySelector('strong').textContent = 'Play';

      if (!isMobile) {
        alert('AR works only on mobile devices.');
        return;
      }

      await modelViewer.updateComplete;

      try { await arSound.play(); } catch (e) { console.warn('Audio play blocked:', e); }

      try {
        if (modelViewer.canActivateAR) modelViewer.activateAR();
        else alert('AR not supported in this browser.');
      } catch (err) {
        console.error('AR activation failed:', err);
      }
    });

    modelViewer.addEventListener('ar-status', (event) => {
      if (event.detail.status === 'presenting') {
        // Stop browser audio if using Scene Viewer/Quick Look
        // If you are using WebXR, you might want to keep this playing.
        arSound.pause();
      } else if (event.detail.status === 'not-presenting') {
        if (isPlaying) { arSound.play(); video.play(); }
      }
    });
  });
  </script>
</body>
</html>
